<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DUO+</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

  <!-- Bootstrap + HopeUI CSS -->
  <link href="assets/css/hope-ui.min.css" rel="stylesheet">
  <link href="assets/css/custom.css" rel="stylesheet">

</head>

<body class="d-flex align-items-center justify-content-center min-vh-100 v-center-page">

  <div id="divLanguageSwitch">
    <select name="languageSwitch" id="selLanguageSwitch" class="d-none" aria-hidden="true">
      <option value="en">EN</option>
      <option value="es">ES</option>
    </select>
    <div class="lang-toggle" role="radiogroup" aria-label="Select language">
      <button type="button" class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
      <button type="button" class="lang-btn" data-lang="es" aria-pressed="false">ES</button>
    </div>
  </div>

  <div class="container text-center login-container" style="padding-top: 3.5rem;">
    
    <!-- Logo Section -->
    <div class="logo-section mb-3">
      <img src="assets/images/DUOPlusDropLogo.png" alt="DUO Plus - Home" class="mb-1" style="width: 200px;">
    </div>

    <!-- Subtitle -->
    <h5 id="subtitle" class="subtitle-text fw-medium mb-4" style="color: #174593;">
      Connecting patients with free<br>care through DUO
    </h5>

    <!-- Login Box -->
    <div class="card shadow-lg border-0 rounded-4 mb-4 mt-4">
      <div class="card-body p-4">
        <form id="clientLoginForm" novalidate>
          <div class="mb-3 text-start">
            <label id="lblClientEmail" for="txtClientEmail" class="form-label fw-semibold">Email</label>
            <input type="email" name="email" id="txtClientEmail" class="form-control" required>
          </div>

          <div class="mb-3 text-start">
            <label id="lblClientPassword" for="txtClientPassword" class="form-label fw-semibold">Password</label>
            <input type="password" name="password" id="txtClientPassword" class="form-control" required>
          </div>

          <!-- Main Login Button -->
          <button id="btnClientLogin" type="button" class="btn btn-primary w-100 rounded-2 ">Login</button>
        </form>
      </div>
    </div>

    <!-- Register + Forget Password Section -->
    <div class="register-section">
      <div class="d-flex align-items-center justify-content-center mb-2" aria-hidden="true">
        <hr class="flex-grow-1" style="height:1px; background-color:#ccc; border:none;">
                <span id="orText" class="mx-2 text-muted fw-semibold">Or</span>
        <hr class="flex-grow-1" style="height:1px; background-color:#ccc; border:none;">
      </div>

      <!-- Register Link -->
      <div class="d-flex flex-column align-items-center justify-content-center gap-1 mb-3">
        <a id="btn2Register" href="pages/register.html" style="color: #174593;"
          class="fw-semibold text-decoration-none text-center text-nowrap">Register</a>

        <!-- Horizontal Line -->
        <hr class="w-75 my-1" style="height:1px; background-color:#ccc; border:none;">

      <!-- Forget Password Link -->
        <a id="btn2ForgetPass" href="pages/forgetpass.html" style="color: #174593;"
          class="fw-semibold text-decoration-none text-center text-nowrap">Forgot Password?</a>
      </div>

      <!-- Life Church Logo -->
      <div class="d-flex flex-column align-items-center">
        <img src="assets/images/lifeChurchLogo.webp" alt="Life Church - Partner Organization" class="mb-3" style="width: 200px;">
      </div>
    </div>

    <!-- Dev Links -->
    <div class="text-center mt-2 mb-1">
      <div class="dev-bar">
        <span class="dev-bar-label">Dev</span>
        <a href="/portal/" class="dev-link">API Portal</a>
        <a href="pages/registration-dashboard.html" class="dev-link">Reg. Dashboard</a>
        <a href="pages/waitingroom.html" class="dev-link">Waiting Room</a>
        <a href="pages/service-scan.html" class="dev-link">Service Scan</a>
        <a href="pages/food-truck.html" class="dev-link">Food Truck</a>
        <a href="pages/admin.html" class="dev-link">Admin</a>
      </div>
    </div>
  </div>

  <!-- JS Dependencies -->
  <script src="assets/js/alerts/sweetalert2.all.min.js"></script>
  <script src="js/login.js"></script>
  <script src="js/lang.js"></script>
</body>

</html>
