<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#72B2D4">
    <title>DUO+ | Service Scan In</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

    <link href="../assets/css/hope-ui.min.css" rel="stylesheet">
    <link href="../assets/css/custom.css" rel="stylesheet">
    <link href="../assets/css/bootstrap-icons-1.13.1/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center py-5">

        <div class="container-fluid">
            <div class="container" style="max-width: 600px;">

                <!-- Logo -->
                <!-- <div class="row mb-4">
                    <div class="col-12 text-center">
                        <img src="../assets/images/DUOvolunteerlogo.png" alt="DUO Plus" style="width: 100px;">
                    </div>
                </div> -->

                <!-- Service Content (shown after PIN verified and service determined) -->
                <div id="serviceContent">

                    <!-- Service Header and Stats -->
                    <div class="card mb-4">
                        <div class="card-header d-flex justify-content-between align-items-center bg-primary p-3" id="serviceHeader">
                            <h5 class="text-white mb-0 fw-bold" id="serviceTitle">Service</h5>
                            <button id="btnScan" type="button" class="btn bg-primary btn-sm rounded-2 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px; padding: 0; border: none; transition: all 0.2s ease;">
                                <i style="color: white; font-size: 2rem;" class="bi bi-qr-code-scan"></i>
                            </button>
                        </div>
                        
                        <div class="card-body p-4">
                            <div class="row g-4">
                                <div class="col-12 col-sm-6">
                                    <div class="mb-3">
                                        <h6 class="text-primary fw-bold mb-2" style="font-size: 0.9rem;" id="stat1Label">Waitlist</h6>
                                        <div class="bg-white rounded-pill border shadow-sm p-2 px-3 d-flex justify-content-between align-items-center">
                                            <i class="bi bi-people h4 mb-0 text-dark"></i>
                                            <span class="h3 fw-bold mb-0" id="stat1Value">0</span>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <h6 class="text-primary fw-bold mb-2" style="font-size: 0.9rem;" id="stat2Label">In Progress</h6>
                                        <div class="bg-white rounded-pill border shadow-sm p-2 px-3 d-flex justify-content-between align-items-center">
                                            <i class="bi bi-person-dash h4 mb-0 text-dark"></i>
                                            <span class="h3 fw-bold mb-0" id="stat2Value">0</span>
                                        </div>
                                    </div>
                                    <div>
                                        <h6 class="text-primary fw-bold mb-2" style="font-size: 0.9rem;" id="stat3Label">Completed</h6>
                                        <div class="bg-white rounded-pill border shadow-sm p-2 px-3 d-flex justify-content-between align-items-center">
                                            <i class="bi bi-person-check h4 mb-0 text-dark"></i>
                                            <span class="h3 fw-bold mb-0" id="stat3Value">0</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="bg-white rounded-5 border shadow-sm h-100 p-4 d-flex flex-column justify-content-center text-center text-sm-start">
                                        <span class="fw-bold text-dark mb-1">Avg. Service Time</span>
                                        <h2 class="text-primary fw-bold mb-4" id="avgTime">0 min</h2>

                                        <span class="fw-bold text-dark mb-1">Past Avg. Service Time</span>
                                        <h2 class="text-primary fw-bold mb-0" id="pastAvgTime">0 min</h2>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Waitlist Table -->
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center gap-2 bg-primary p-3">
                            <h5 class="text-white mb-0 fw-bold" id="waitlistTitle">Service - Waitlist</h5>
                            <div class="d-flex gap-2 align-items-center" style="flex: 1; justify-content: flex-end;">
                                <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search" style="max-width: 180px;">
                                <button id="btnManualAdd" type="button" class="btn btn-light btn-sm text-primary fw-bold px-3 rounded-2 d-flex align-items-center gap-2" title="Manually add client">
                                    <i class="bi bi-plus-lg"></i>
                                    <span>Add</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="card-body p-0 position-relative">
                            <div class="custom-scroll-indicator" style="height: 50%; top: 25%;"></div>

                            <div class="table-responsive" style="max-height: 400px; overflow-y: auto; overflow-x: hidden; scrollbar-width: none;">
                                <table class="table table-borderless align-middle mb-0">
                                    <thead class="d-none d-md-table-header-group">
                                        <tr class="border-bottom">
                                            <th scope="col" class="ps-3" style="width: 50%;">Name</th>
                                            
                                            <th scope="col" style="width: 30%;">DOB</th>
                                            
                                            <th scope="col" class="text-end pe-3" style="width: 20%;"></th> 
                                        </tr>
                                    </thead>
                                    <tbody id="waitlistBody">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    <script src="../assets/js/alerts/sweetalert2.all.min.js"></script>
    <script src="../assets/js/core/libs.min.js"></script>
    <script src="../assets/js/jsQR.js"></script>
    <script src="../js/pinCode.js"></script>
    <script src="../js/Service.js"></script>
    
    <script>
        // Setup search functionality
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                filterWaitlist(e.target.value);
            });
        }
    </script>
    </body>
</html>
